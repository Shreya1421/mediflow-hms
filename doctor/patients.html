<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Patients — MediFlow Doctor</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/doctor.css">
</head>
<body>
<nav class="doctor-topnav">
  <a href="../index.html" class="doctor-topnav-logo"><div class="doctor-topnav-logo-icon">🏥</div>Medi<span>Flow</span></a>
  <span class="doctor-topnav-badge">🩺 Doctor Portal</span>
  <div class="doctor-topnav-spacer"></div>
  <div class="doctor-topnav-user">
    <div class="doctor-topnav-avatar" id="doctorInitial">D</div>
    <span id="doctorName">Doctor</span>
    <a href="#" class="doctor-topnav-logout" onclick="doctorLogout()">Logout</a>
  </div>
</nav>
<aside class="doctor-sidebar">
  <div class="doctor-sidebar-label">Overview</div>
  <a href="dashboard.html"><span class="doctor-sidebar-icon">📊</span> Dashboard</a>
  <div class="doctor-sidebar-label">My Work</div>
  <a href="schedule.html"><span class="doctor-sidebar-icon">📅</span> My Schedule</a>
  <a href="appointments.html"><span class="doctor-sidebar-icon">🗓️</span> Appointments</a>
  <a href="patients.html" class="active"><span class="doctor-sidebar-icon">🧑‍⚕️</span> My Patients</a>
  <div class="doctor-sidebar-label">Reports</div>
  <a href="reports.html"><span class="doctor-sidebar-icon">📋</span> My Reports</a>
  <div class="doctor-sidebar-label">Account</div>
  <a href="profile.html"><span class="doctor-sidebar-icon">👤</span> My Profile</a>
  <a href="../index.html"><span class="doctor-sidebar-icon">🌐</span> View Site</a>
</aside>
<main class="doctor-main">
  <div class="doctor-page-header">
    <div class="doctor-page-eyebrow">My Work</div>
    <h1 class="doctor-page-title">My Patients</h1>
    <p class="doctor-page-sub">All patients assigned to you. Click View to see full history and add notes.</p>
  </div>
  <div class="doctor-card">
    <div class="doctor-card-header">
      <span class="doctor-card-title">Patient List</span>
      <div style="display:flex;gap:10px;">
        <div class="doctor-search"><span>🔍</span><input type="text" id="searchInput" placeholder="Search by name..." oninput="renderTable()"></div>
        <span id="patCount" style="font-size:12px;color:var(--muted);align-self:center;"></span>
      </div>
    </div>
    <div id="patTable"></div>
  </div>
</main>
<script src="../js/auth.js"></script>
<script src="../js/doctor.js"></script>
<script>
  requireDoctor();
  buildDocNav();
  const s = getSession();

  function renderTable() {
    const q=document.getElementById('searchInput').value.toLowerCase();
    const pats=getMyPatients(s.doctorId).filter(p=>!q||p.name.toLowerCase().includes(q)||p.phone.includes(q));
    document.getElementById('patCount').textContent=pats.length+' patients';
    if(!pats.length){
      document.getElementById('patTable').innerHTML='<div class="doctor-empty"><div class="doctor-empty-icon">🧑‍⚕️</div><div>No patients found.</div></div>';
      return;
    }
    const apts=getMyAppointments(s.doctorId);
    document.getElementById('patTable').innerHTML=`
      <table class="doctor-table">
        <thead><tr><th>ID</th><th>Name</th><th>Age</th><th>Gender</th><th>Blood</th><th>Phone</th><th>Email</th><th>Visits</th><th>Notes</th><th>Action</th></tr></thead>
        <tbody>${pats.map(p=>{
          const visits=apts.filter(a=>a.patientName===p.name||a.patientId===p.id);
          return `<tr>
            <td class="td-muted">${p.id}</td>
            <td><strong>${p.name}</strong></td>
            <td class="td-muted">${p.age||'—'}</td>
            <td class="td-muted">${p.gender||'—'}</td>
            <td><span class="badge badge-navy">${p.blood||'—'}</span></td>
            <td class="td-muted">${p.phone}</td>
            <td class="td-muted">${p.email||'—'}</td>
            <td class="td-muted">${visits.length} visits</td>
            <td class="td-muted" style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.notes||'—'}</td>
            <td><a href="patient-detail.html?id=${p.id}" class="doctor-btn doctor-btn-outline doctor-btn-sm">View →</a></td>
          </tr>`;
        }).join('')}</tbody>
      </table>`;
  }
  renderTable();
</script>
</body>
</html>
