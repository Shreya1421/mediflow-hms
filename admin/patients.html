<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patients — MediFlow Admin</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<nav class="admin-topnav">
  <a href="../index.html" class="admin-topnav-logo"><div class="admin-topnav-logo-icon">🏥</div>Medi<span>Flow</span></a>
  <span class="admin-topnav-badge">🛡️ Admin Portal</span>
  <div class="admin-topnav-spacer"></div>
  <div class="admin-topnav-user">
    <div class="admin-topnav-avatar">A</div>
    <span id="adminName">Admin</span>
    <a href="#" class="admin-topnav-logout" onclick="adminLogout()">Logout</a>
  </div>
</nav>
<aside class="admin-sidebar">
  <div class="admin-sidebar-label">Overview</div>
  <a href="dashboard.html"><span class="admin-sidebar-icon">📊</span> Dashboard</a>
  <div class="admin-sidebar-label">Management</div>
  <a href="doctors.html"><span class="admin-sidebar-icon">🩺</span> Doctors</a>
  <a href="patients.html" class="active"><span class="admin-sidebar-icon">🧑‍⚕️</span> Patients</a>
  <a href="appointments.html"><span class="admin-sidebar-icon">📅</span> Appointments</a>
  <div class="admin-sidebar-label">Reports</div>
  <a href="reports.html"><span class="admin-sidebar-icon">📋</span> Weekly Reports</a>
  <div class="admin-sidebar-label">Settings</div>
  <a href="settings.html"><span class="admin-sidebar-icon">⚙️</span> Settings</a>
  <a href="../index.html"><span class="admin-sidebar-icon">🌐</span> View Site</a>
</aside>
<main class="admin-main">
  <div class="admin-page-header">
    <div class="admin-page-eyebrow">Management</div>
    <h1 class="admin-page-title">All Patients</h1>
    <p class="admin-page-sub">View, add, and manage all registered patients.</p>
  </div>
  <div class="admin-alert" id="alertBox"></div>

  <!-- Add Patient -->
  <div class="admin-card" style="margin-bottom:24px;">
    <div class="admin-card-header">
      <span class="admin-card-title">➕ Add Patient Manually</span>
      <button class="admin-btn admin-btn-outline admin-btn-sm" onclick="toggleForm()">Toggle Form</button>
    </div>
    <div id="addForm" style="display:none;">
      <div class="admin-form-grid">
        <div class="admin-form-group"><label>Full Name *</label><input type="text" id="pName" placeholder="Priya Sharma"></div>
        <div class="admin-form-group"><label>Age *</label><input type="number" id="pAge" placeholder="28"></div>
        <div class="admin-form-group"><label>Gender *</label>
          <select id="pGender"><option value="">Select</option><option>Male</option><option>Female</option><option>Other</option></select></div>
        <div class="admin-form-group"><label>Blood Group *</label>
          <select id="pBlood"><option value="">Select</option><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>AB+</option><option>AB-</option><option>O+</option><option>O-</option></select></div>
        <div class="admin-form-group"><label>Phone *</label><input type="tel" id="pPhone" placeholder="9876543210"></div>
        <div class="admin-form-group"><label>Email *</label><input type="email" id="pEmail" placeholder="patient@email.com"></div>
        <div class="admin-form-group"><label>Password *</label><input type="text" id="pPass" placeholder="For patient login"></div>
        <div class="admin-form-group"><label>Department</label>
          <select id="pDept"><option value="">Select</option><option>General</option><option>Cardiology</option><option>Neurology</option><option>Orthopaedics</option><option>Gynaecology</option><option>Paediatrics</option><option>Dermatology</option><option>ENT</option></select></div>
        <div class="admin-form-group"><label>Assign Doctor</label>
          <select id="pDoctor"><option value="">Select doctor</option></select></div>
        <div class="admin-form-group"><label>Address</label><input type="text" id="pAddress" placeholder="City, State"></div>
        <div class="admin-form-group admin-form-full"><label>Medical Notes</label><input type="text" id="pNotes" placeholder="Existing conditions, allergies..."></div>
      </div>
      <div class="admin-form-actions">
        <button class="admin-btn admin-btn-primary" onclick="addPatient()">Add Patient</button>
        <button class="admin-btn admin-btn-outline" onclick="clearForm()">Clear</button>
      </div>
    </div>
  </div>

  <!-- Filter + Table -->
  <div class="admin-card">
    <div class="admin-card-header">
      <span class="admin-card-title">Patient Records</span>
      <div style="display:flex;gap:10px;align-items:center;">
        <select id="filterDept" onchange="renderTable()" style="padding:7px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);background:var(--bg);outline:none;">
          <option value="">All Departments</option>
          <option>General</option><option>Cardiology</option><option>Neurology</option>
          <option>Orthopaedics</option><option>Gynaecology</option><option>Paediatrics</option>
        </select>
        <div class="admin-search"><span>🔍</span><input type="text" id="searchInput" placeholder="Search patients..." oninput="renderTable()"></div>
        <span id="patientCount" style="font-size:12px;color:var(--muted);">0 records</span>
      </div>
    </div>
    <div id="patientTable"></div>
  </div>
</main>
<script src="../js/auth.js"></script>
<script src="../js/admin.js"></script>
<script>
  requireAdmin();
  const s=getSession(); if(s) document.getElementById('adminName').textContent=s.name||'Admin';

  function populateDoctorSelect() {
    const sel = document.getElementById('pDoctor');
    getDoctors().forEach(d => {
      const o = document.createElement('option'); o.value=d.id; o.textContent=`${d.name} — ${d.dept}`; sel.appendChild(o);
    });
  }
  populateDoctorSelect();

  function toggleForm() { const f=document.getElementById('addForm'); f.style.display=f.style.display==='none'?'block':'none'; }

  function addPatient() {
    const name=document.getElementById('pName').value.trim();
    const age=document.getElementById('pAge').value;
    const gender=document.getElementById('pGender').value;
    const blood=document.getElementById('pBlood').value;
    const phone=document.getElementById('pPhone').value.trim();
    const email=document.getElementById('pEmail').value.trim();
    const pass=document.getElementById('pPass').value;
    const dept=document.getElementById('pDept').value;
    const doctor=document.getElementById('pDoctor').value;
    const address=document.getElementById('pAddress').value.trim();
    const notes=document.getElementById('pNotes').value.trim();
    if(!name||!age||!gender||!blood||!phone||!email||!pass){showAlert('alertBox','Fill all required fields.','error');return;}
    const patients=getPatients();
    if(patients.find(p=>p.email===email)){showAlert('alertBox','Email already exists.','error');return;}
    const id=nextId('PAT',patients);
    savePatient({id,name,age,gender,blood,phone,email,password:pass,dept,doctor,address,notes,visits:[]});
    showAlert('alertBox',`${name} registered. Patient ID: ${id}`);
    clearForm(); renderTable();
  }

  function clearForm(){
    ['pName','pAge','pPhone','pEmail','pPass','pAddress','pNotes'].forEach(i=>document.getElementById(i).value='');
    ['pGender','pBlood','pDept'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('pDoctor').value='';
  }

  function deletePatient(id){
    if(!confirm('Delete this patient record?'))return;
    deleteById('mf_patients',id);
    showAlert('alertBox','Patient deleted.');
    renderTable();
  }

  function renderTable(){
    const q=document.getElementById('searchInput').value.toLowerCase();
    const dept=document.getElementById('filterDept').value;
    const doctors=getDoctors();
    let patients=getPatients().filter(p=>{
      const mq=!q||p.name.toLowerCase().includes(q)||p.phone.includes(q)||(p.email||'').toLowerCase().includes(q);
      const md=!dept||p.dept===dept;
      return mq&&md;
    });
    document.getElementById('patientCount').textContent=patients.length+' records';
    if(!patients.length){
      document.getElementById('patientTable').innerHTML='<div class="admin-empty"><div class="admin-empty-icon">🧑‍⚕️</div><div class="admin-empty-text">No patients found.</div></div>';
      return;
    }
    document.getElementById('patientTable').innerHTML=`
      <table class="admin-table">
        <thead><tr><th>ID</th><th>Name</th><th>Age</th><th>Blood</th><th>Dept</th><th>Assigned Doctor</th><th>Phone</th><th>Actions</th></tr></thead>
        <tbody>${patients.map(p=>{
          const doc=doctors.find(d=>d.id===p.doctor);
          return `<tr>
            <td class="td-muted">${p.id}</td>
            <td><strong>${p.name}</strong><br><span style="font-size:11px;color:var(--muted);">${p.email||''}</span></td>
            <td class="td-muted">${p.age||'—'}</td>
            <td><span class="badge badge-navy">${p.blood||'—'}</span></td>
            <td class="td-muted">${p.dept||'—'}</td>
            <td class="td-muted">${doc?doc.name:'—'}</td>
            <td class="td-muted">${p.phone}</td>
            <td style="display:flex;gap:6px;">
              <a href="patient-detail.html?id=${p.id}" class="admin-btn admin-btn-outline admin-btn-sm">View</a>
              <button class="admin-btn admin-btn-danger admin-btn-sm" onclick="deletePatient('${p.id}')">Delete</button>
            </td>
          </tr>`;
        }).join('')}</tbody>
      </table>`;
  }
  renderTable();
</script>
</body>
</html>
